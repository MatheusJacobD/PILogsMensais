<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="card">

            <div class="header">
                <a href="https://www.youtube.com">
                    <img src="back.png" class="back">
                </a>
            </div>

            <div class="logoArea">
                <img src="logo.png" class="logo">
                <img src="logotipo.png" class="logotipo">
            </div>

            <div class="sloganArea">
                <img src="controle.png" class="slogan">
            </div>

            <div class="form">
                <label>Código de Transporte</label>

                <div class="inputGroup">
                    <input type="text" placeholder="Ex: 382">
                    <button>Acessar</button>
                </div>
            </div>

            <div class="logs">
                <label>Logs Detalhados</label>
                <button class="full">Acessar Logs Mensais</button>
            </div>

        </div>
    </div>
</body>

</html>
